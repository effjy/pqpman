<?xml version="1.0" encoding="UTF-8"?>
<svg width="256" height="256" viewBox="0 0 256 256" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0a0f1a"/>
      <stop offset="1" stop-color="#060910"/>
    </linearGradient>
    <linearGradient id="shield" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#00e5ff"/>
      <stop offset="1" stop-color="#b026ff"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.4" r="0.6">
      <stop offset="0" stop-color="#b026ff" stop-opacity="0.45"/>
      <stop offset="1" stop-color="#b026ff" stop-opacity="0"/>
    </radialGradient>
    <filter id="f" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="2.5"/>
    </filter>
  </defs>

  <!-- rounded dark tile -->
  <rect x="8" y="8" width="240" height="240" rx="46" fill="url(#bg)" stroke="#11202e" stroke-width="2"/>
  <ellipse cx="128" cy="112" rx="120" ry="110" fill="url(#glow)"/>

  <!-- shield -->
  <path d="M128 34 L206 64 V128 C206 178 170 210 128 226 C86 210 50 178 50 128 V64 Z"
        fill="#0c1626" stroke="url(#shield)" stroke-width="6"
        stroke-linejoin="round"/>
  <path d="M128 34 L206 64 V128 C206 178 170 210 128 226 C86 210 50 178 50 128 V64 Z"
        fill="none" stroke="#00e5ff" stroke-width="6" stroke-linejoin="round"
        opacity="0.35" filter="url(#f)"/>

  <!-- quantum orbits (post-quantum motif) -->
  <g stroke="#00e5ff" stroke-width="3" fill="none" opacity="0.85">
    <ellipse cx="128" cy="118" rx="62" ry="24"/>
    <ellipse cx="128" cy="118" rx="62" ry="24" transform="rotate(60 128 118)"/>
    <ellipse cx="128" cy="118" rx="62" ry="24" transform="rotate(-60 128 118)" stroke="#b026ff"/>
  </g>
  <g fill="#39ff14">
    <circle cx="190" cy="118" r="5"/>
    <circle cx="97" cy="71" r="5" fill="#00e5ff"/>
    <circle cx="159" cy="165" r="5" fill="#b026ff"/>
  </g>

  <!-- central keyhole / nucleus -->
  <circle cx="128" cy="118" r="20" fill="#0a121e" stroke="url(#shield)" stroke-width="5"/>
  <circle cx="128" cy="112" r="7" fill="#00e5ff"/>
  <rect x="124.5" y="116" width="7" height="16" rx="3" fill="#00e5ff"/>
</svg>
